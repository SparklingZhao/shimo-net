<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私有部署 - 石墨文档企业服务</title>
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/private-deploy.css">
</head>
<body>
  <main class="pd-page">
    <section class="pd-hero">
      <div class="container">
        <h1 class="pd-title">私有部署</h1>
        <p class="pd-desc">支持企业在自有基础设施中完成文档服务部署，实现数据主权、安全隔离与高可用运行。</p>
      </div>
    </section>

    <section class="pd-pillars-section">
      <div class="container">
        <div class="pd-pillars-grid">
          <div class="pd-pillar">
            <div class="pd-pillar-head">
              <div class="pd-pillar-icon pd-pillar-icon--data">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <ellipse cx="12" cy="5" rx="9" ry="3"/>
                  <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
                  <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
                </svg>
              </div>
              <div class="pd-pillar-text">
                <h2 class="pd-pillar-title">数据自主</h2>
                <p class="pd-pillar-desc">所有数据存储于客户指定的服务器或机房，实现物理隔离。</p>
              </div>
            </div>
          </div>

          <div class="pd-pillar">
            <div class="pd-pillar-head">
              <div class="pd-pillar-icon pd-pillar-icon--deploy">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 2l9 4.9v10.2L12 22 3 17.1V6.9L12 2z"/>
                  <path d="M12 22V12"/>
                  <path d="M21 6.9L12 12 3 6.9"/>
                </svg>
              </div>
              <div class="pd-pillar-text">
                <h2 class="pd-pillar-title">灵活部署</h2>
                <p class="pd-pillar-desc">支持高可用集群架构，可部署于公有云、私有云或物理服务器。</p>
              </div>
            </div>
          </div>

          <div class="pd-pillar">
            <div class="pd-pillar-head">
              <div class="pd-pillar-icon pd-pillar-icon--support">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15a2 2 0 0 1-2 2h-3l-4 4v-4H7a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2z"/>
                  <path d="M9 10h.01M13 10h.01M17 10h.01"/>
                </svg>
              </div>
              <div class="pd-pillar-text">
                <h2 class="pd-pillar-title">技术支持</h2>
                <p class="pd-pillar-desc">产品使用、部署、升级到长期运维全流程的专业支持服务。</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
