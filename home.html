<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>石墨文档企业服务 - 首页整合展示</title>
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/home.css">
</head>
<body>
  <iframe class="home-flow-frame" src="./banner.html" title="首页 Banner 展示"></iframe>
  <iframe class="home-flow-frame" src="./collaboration.html" title="文档协作展示"></iframe>
  <iframe class="home-flow-frame" src="./knowledge.html" title="知识沉淀展示"></iframe>
  <iframe class="home-flow-frame" src="./integration.html" title="开放集成展示"></iframe>
  <iframe class="home-flow-frame" src="./ai.html" title="AI 助力展示"></iframe>
  <iframe class="home-flow-frame" src="./security-hub.html" title="安全能力展示"></iframe>
  <iframe class="home-flow-frame" src="./customer-wall.html" title="客户墙展示"></iframe>

  <section class="home-flow-cta-section">
    <div class="container">
      <div class="home-flow-cta-card">
        <div>
          <p class="home-flow-cta-eyebrow">方案咨询</p>
          <h2>想了解更适合你业务的石墨企业服务方案？</h2>
          <p>告诉我们你的业务规模、协作场景和部署要求，石墨团队将协助评估合适的产品组合与落地路径。</p>
        </div>
        <div class="home-flow-cta-actions">
          <a class="btn btn-primary" href="./welcome.html#demo">预约演示</a>
        </div>
      </div>
    </div>
  </section>

  <script>
    (function () {
      var frames = document.querySelectorAll(".home-flow-frame");

      function getDocHeight(doc) {
        var body = doc.body;
        var html = doc.documentElement;
        return Math.max(
          body ? body.scrollHeight : 0,
          body ? body.offsetHeight : 0,
          html ? html.clientHeight : 0,
          html ? html.scrollHeight : 0,
          html ? html.offsetHeight : 0
        );
      }

      function resizeFrame(frame) {
        var doc = frame.contentDocument;
        if (!doc) return;
        frame.style.height = "0px";
        frame.style.height = getDocHeight(doc) + "px";
      }

      frames.forEach(function (frame) {
        frame.addEventListener("load", function () {
          resizeFrame(frame);

          var doc = frame.contentDocument;
          if (!doc) return;

          if (window.ResizeObserver) {
            var observer = new ResizeObserver(function () {
              resizeFrame(frame);
            });
            if (doc.body) observer.observe(doc.body);
            if (doc.documentElement) observer.observe(doc.documentElement);
          }

          setTimeout(function () {
            resizeFrame(frame);
          }, 100);
        });
      });

      window.addEventListener("resize", function () {
        frames.forEach(resizeFrame);
      });
    })();
  </script>
</body>
</html>
