<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片展示页</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/gallery.css">
</head>
<body>
  <header class="gallery-header">
    <div class="container">
      <div class="gallery-title-row">
        <h1>图片展示页</h1>
        <a class="gallery-back-link" href="../welcome.html">返回首页</a>
      </div>
      <p class="gallery-desc">
        自动展示 <code>assets/images</code> 下所有 PNG 图片（可读取目录索引时自动发现新增）。
      </p>
      <div class="gallery-controls">
        <input id="searchInput" type="search" placeholder="按图片名搜索..." aria-label="按图片名搜索">
        <button id="refreshBtn" type="button">刷新列表</button>
      </div>
      <div class="gallery-meta" id="galleryMeta">正在加载图片...</div>
    </div>
  </header>

  <main class="gallery-main">
    <div class="container">
      <div id="galleryGrid" class="gallery-grid"></div>
      <div id="emptyState" class="gallery-empty" hidden>没有可展示的图片。</div>
    </div>
  </main>

  <script src="../js/gallery.js"></script>
</body>
</html>
