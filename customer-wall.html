<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客户墙 - 石墨文档企业服务</title>
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/customer-wall.css">
</head>
<body>
  <main>
    <!-- 标题区 -->
    <section class="cw-hero">
      <div class="container">
        <h1 class="cw-title">值得信赖</h1>
        <p class="cw-subtitle">覆盖互联网、教育、媒体、金融、房地产、新零售、电商等 30 多个行业</p>
        <div class="cw-hero-actions">
          <a class="btn" href="./welcome.html#demo">申请试用</a>
          <a class="btn btn-primary" href="./welcome.html#demo">预约演示</a>
        </div>
      </div>
    </section>

    <!-- 数据统计区 -->
    <section class="cw-stats">
      <div class="container">
        <ul class="cw-stats-list">
          <li class="cw-stat-item">
            <span class="cw-stat-number">1<em>亿+</em></span>
            <span class="cw-stat-label">注册用户</span>
          </li>
          <li class="cw-stat-divider" aria-hidden="true"></li>
          <li class="cw-stat-item">
            <span class="cw-stat-number">100<em>万+</em></span>
            <span class="cw-stat-label">服务企业</span>
          </li>
          <li class="cw-stat-divider" aria-hidden="true"></li>
          <li class="cw-stat-item">
            <span class="cw-stat-number">1500<em>亿+</em></span>
            <span class="cw-stat-label">文字存储量</span>
          </li>
        </ul>
      </div>
      
    </section>


  </main>
</body>
</html>
