<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据安全 - 石墨文档企业服务</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/security.css">
</head>
<body>
  <main class="sec-page">

    <!-- Hero -->
    <section class="sec-hero">
      <div class="container">
        <h1 class="sec-title">数据安全</h1>
        <p class="sec-desc">Saas服务与私有化服务提供一致的高等级安全保障，覆盖传输、应用、存储三层防护体系。</p>
      </div>
    </section>

    <!-- 三大安全支柱 -->
    <section class="sec-pillars-section">
      <div class="container">
        <div class="sec-pillars-grid">

          <!-- 传输安全 -->
          <div class="sec-pillar">
            <div class="sec-pillar-head">
              <div class="sec-pillar-icon sec-pillar-icon--transfer">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="5" y="11" width="14" height="10" rx="2"/>
                  <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
                  <circle cx="12" cy="16" r="1"/>
                </svg>
              </div>
              <div class="sec-pillar-text">
                <h2 class="sec-pillar-title">传输安全</h2>
                <p class="sec-pillar-desc">全链路强制 TLS/SSL 协议加密，确保数据在网络传输全程防窃听、防篡改。</p>
              </div>
            </div>
          </div>

          <!-- 应用与权限安全 -->
          <div class="sec-pillar">
            <div class="sec-pillar-head">
              <div class="sec-pillar-icon sec-pillar-icon--app">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                  <circle cx="9" cy="7" r="4"/>
                  <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                  <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
              </div>
              <div class="sec-pillar-text">
                <h2 class="sec-pillar-title">应用与权限安全</h2>
                <p class="sec-pillar-desc">身份认证、精细权限与接口防护三重机制，构建应用层完整安全屏障。</p>
              </div>
            </div>
          </div>

          <!-- 存储与备份 -->
          <div class="sec-pillar">
            <div class="sec-pillar-head">
              <div class="sec-pillar-icon sec-pillar-icon--storage">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <ellipse cx="12" cy="5" rx="9" ry="3"/>
                  <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
                  <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
                </svg>
              </div>
              <div class="sec-pillar-text">
                <h2 class="sec-pillar-title">存储与备份</h2>
                <p class="sec-pillar-desc">针对 SaaS 与私有部署提供差异化存储策略，兼顾数据可靠性与主权自控。</p>
              </div>
            </div>
          </div>

        </div>
      </div>
    </section>

  </main>
</body>
</html>
