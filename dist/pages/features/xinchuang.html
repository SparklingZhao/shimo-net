<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>信创合规 - 石墨文档企业服务</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/xinchuang.css">
</head>
<body>
  <main class="xc-page">

    <!-- Hero -->
    <section class="xc-hero">
      <div class="container">
        <h1 class="xc-title">信创合规</h1>
        <p class="xc-desc">全面适配国产化环境，满足安全可控要求。</p>
      </div>
    </section>

    <!-- 三大能力 -->
    <section class="xc-pillars-section">
      <div class="container">
        <div class="xc-layout">
          <div class="xc-left-col">
            <!-- 全栈兼容 -->
            <div class="xc-pillar xc-pillar--accent">
              <div class="xc-pillar-head">
                <div class="xc-pillar-icon xc-pillar-icon--compat">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <path d="M8 21h8M12 17v4"/>
                  </svg>
                </div>
                <div class="xc-pillar-text">
                  <h2 class="xc-pillar-title">全栈兼容</h2>
                  <p class="xc-pillar-desc">支持主流信创硬件、操作系统与数据库。</p>
                </div>
              </div>
            </div>

            <!-- 纯国产软件 -->
            <div class="xc-pillar xc-pillar--accent">
              <div class="xc-pillar-head">
                <div class="xc-pillar-icon xc-pillar-icon--control">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                  </svg>
                </div>
                <div class="xc-pillar-text">
                  <h2 class="xc-pillar-title">纯国产软件</h2>
                  <p class="xc-pillar-desc">自主研发的纯国产云端 Office，保障企业数据安全与自主可控。</p>
                </div>
              </div>
            </div>
          </div>

          <div class="xc-right-col">
            <!-- 资质完备 -->
            <div class="xc-pillar xc-pillar--featured xc-pillar--tall">
              <div class="xc-pillar-head">
                <div class="xc-pillar-icon xc-pillar-icon--cert">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="6"/>
                    <path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/>
                  </svg>
                </div>
                <div class="xc-pillar-text">
                  <h2 class="xc-pillar-title">资质完备</h2>
                  <p class="xc-pillar-desc">已获得网络安全等级保护三级、ISO 安全体系等权威认证。</p>
                </div>
              </div>
              <div class="xc-cert-list">
                <div class="xc-cert-item">
                  <div class="xc-cert-badge xc-cert-badge--grade">公安部三级等级保护</div>
                  <p>通过公安部网络安全等级保护三级认证，满足高安全要求行业合规标准。</p>
                </div>
                <div class="xc-cert-item">
                  <div class="xc-cert-badge xc-cert-badge--iso">ISO 安全认证体系</div>
                  <p>获得国际信息安全管理体系认证，建立系统化、可审计的安全管理能力。</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>
</body>
</html>
